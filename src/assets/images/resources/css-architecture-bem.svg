
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="100%" height="100%">
      <!-- Space background -->
      <rect width="400" height="225" fill="#0B1120"/>
      <!-- Grid -->
      <path d="M 0 25 L 400 25 M 0 50 L 400 50 M 0 75 L 400 75 M 0 100 L 400 100 M 0 125 L 400 125 M 0 150 L 400 150 M 0 175 L 400 175 M 0 200 L 400 200" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <path d="M 50 0 L 50 225 M 100 0 L 100 225 M 150 0 L 150 225 M 200 0 L 200 225 M 250 0 L 250 225 M 300 0 L 300 225 M 350 0 L 350 225" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <!-- Glowing filters -->
      <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="12" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <radialGradient id="grad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Big backing radial glow -->
      <circle cx="200" cy="112.5" r="160" fill="url(#grad)"/>
      
      <!-- Tech elements -->
      
      <text x="200" y="45" fill="#3B82F6" font-family="sans-serif" font-size="12" font-weight="semibold" letter-spacing="2" text-anchor="middle">
        LAYOUT_GRID_5
      </text>
      <rect x="104" y="64" width="58.66666666666667" height="42" fill="#3B82F6" fill-opacity="0.05" stroke="#06D6E0" stroke-width="1.5" rx="4"/><rect x="104" y="114" width="58.66666666666667" height="42" fill="#3B82F6" filter="url(#glow)" fill-opacity="0.2" stroke="#06D6E0" stroke-width="1.5" rx="4"/><rect x="170.66666666666669" y="64" width="58.66666666666667" height="42" fill="#3B82F6" filter="url(#glow)" fill-opacity="0.2" stroke="#06D6E0" stroke-width="1.5" rx="4"/><rect x="170.66666666666669" y="114" width="58.66666666666667" height="42" fill="#3B82F6" fill-opacity="0.05" stroke="#06D6E0" stroke-width="1.5" rx="4"/><rect x="237.33333333333334" y="64" width="58.66666666666667" height="42" fill="#3B82F6" fill-opacity="0.05" stroke="#06D6E0" stroke-width="1.5" rx="4"/><rect x="237.33333333333334" y="114" width="58.66666666666667" height="42" fill="#3B82F6" fill-opacity="0.05" stroke="#06D6E0" stroke-width="1.5" rx="4"/>
    
    </svg>
  