
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="100%" height="100%">
      <!-- Space background -->
      <rect width="400" height="225" fill="#0B1120"/>
      <!-- Grid -->
      <path d="M 0 25 L 400 25 M 0 50 L 400 50 M 0 75 L 400 75 M 0 100 L 400 100 M 0 125 L 400 125 M 0 150 L 400 150 M 0 175 L 400 175 M 0 200 L 400 200" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <path d="M 50 0 L 50 225 M 100 0 L 100 225 M 150 0 L 150 225 M 200 0 L 200 225 M 250 0 L 250 225 M 300 0 L 300 225 M 350 0 L 350 225" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <!-- Glowing filters -->
      <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="12" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <radialGradient id="grad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#3178C6" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Big backing radial glow -->
      <circle cx="200" cy="112.5" r="160" fill="url(#grad)"/>
      
      <!-- Tech elements -->
      
      <g transform="translate(150, 45)">
        <!-- Cyber Shield -->
        <path d="M 50 0 L 100 20 L 100 70 C 100 100 50 120 50 120 C 50 120 0 100 0 70 L 0 20 Z" fill="none" stroke="#3178C6" stroke-width="2.5" filter="url(#glow)"/>
        <path d="M 50 10 L 90 26 L 90 65 C 90 90 50 107 50 107 C 50 107 10 90 10 65 L 10 26 Z" fill="#3B82F6" fill-opacity="0.1"/>
        <!-- Check mark -->
        <path d="M 35 60 L 45 70 L 65 50" fill="none" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <circle cx="98" cy="150" r="3" fill="#60A5FA" opacity="0.6"/>
      <circle cx="302" cy="70" r="4" fill="#3178C6" opacity="0.5"/>
    
    </svg>
  