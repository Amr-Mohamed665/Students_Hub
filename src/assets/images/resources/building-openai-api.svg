
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="100%" height="100%">
      <!-- Space background -->
      <rect width="400" height="225" fill="#0B1120"/>
      <!-- Grid -->
      <path d="M 0 25 L 400 25 M 0 50 L 400 50 M 0 75 L 400 75 M 0 100 L 400 100 M 0 125 L 400 125 M 0 150 L 400 150 M 0 175 L 400 175 M 0 200 L 400 200" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <path d="M 50 0 L 50 225 M 100 0 L 100 225 M 150 0 L 150 225 M 200 0 L 200 225 M 250 0 L 250 225 M 300 0 L 300 225 M 350 0 L 350 225" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <!-- Glowing filters -->
      <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="12" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <radialGradient id="grad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#EC4899" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Big backing radial glow -->
      <circle cx="200" cy="112.5" r="160" fill="url(#grad)"/>
      
      <!-- Tech elements -->
      
      <line x1="115" y1="100" x2="165" y2="160" stroke="#A855F7" stroke-width="1" opacity="0.3"/><line x1="115" y1="100" x2="215" y2="100" stroke="#A855F7" stroke-width="1" opacity="0.3"/><line x1="115" y1="100" x2="265" y2="160" stroke="#A855F7" stroke-width="1" opacity="0.3"/><line x1="115" y1="100" x2="315" y2="100" stroke="#A855F7" stroke-width="1" opacity="0.3"/><line x1="165" y1="160" x2="215" y2="100" stroke="#A855F7" stroke-width="1" opacity="0.3"/><line x1="165" y1="160" x2="265" y2="160" stroke="#A855F7" stroke-width="1" opacity="0.3"/><line x1="165" y1="160" x2="315" y2="100" stroke="#A855F7" stroke-width="1" opacity="0.3"/><line x1="215" y1="100" x2="265" y2="160" stroke="#A855F7" stroke-width="1" opacity="0.3"/><line x1="215" y1="100" x2="315" y2="100" stroke="#A855F7" stroke-width="1" opacity="0.3"/><line x1="265" y1="160" x2="315" y2="100" stroke="#A855F7" stroke-width="1" opacity="0.3"/>
      <circle cx="115" cy="100" r="5" fill="#A855F7" /><circle cx="165" cy="160" r="5" fill="#A855F7" /><circle cx="215" cy="100" r="5" fill="#A855F7" /><circle cx="265" cy="160" r="8" fill="#EC4899" filter="url(#glow)"/><circle cx="315" cy="100" r="5" fill="#A855F7" />
      <text x="200" y="35" fill="#EC4899" font-family="sans-serif" font-size="12" font-weight="bold" letter-spacing="1" text-anchor="middle" filter="url(#glow)">
        SYNAPSE_NET_4
      </text>
    
    </svg>
  