
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="100%" height="100%">
      <!-- Space background -->
      <rect width="400" height="225" fill="#0B1120"/>
      <!-- Grid -->
      <path d="M 0 25 L 400 25 M 0 50 L 400 50 M 0 75 L 400 75 M 0 100 L 400 100 M 0 125 L 400 125 M 0 150 L 400 150 M 0 175 L 400 175 M 0 200 L 400 200" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <path d="M 50 0 L 50 225 M 100 0 L 100 225 M 150 0 L 150 225 M 200 0 L 200 225 M 250 0 L 250 225 M 300 0 L 300 225 M 350 0 L 350 225" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <!-- Glowing filters -->
      <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="12" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <radialGradient id="grad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#F7DF1E" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Big backing radial glow -->
      <circle cx="200" cy="112.5" r="160" fill="url(#grad)"/>
      
      <!-- Tech elements -->
      
      <g transform="translate(140, 60)" stroke="#F7DF1E" fill="none" stroke-width="2" opacity="0.8">
        <path d="M 0 0 L -20 0 L -20 80 L 0 80" stroke-linecap="round"/>
        <path d="M 120 0 L 140 0 L 140 80 L 120 80" stroke-linecap="round"/>
      </g>
      <text x="200" y="125" fill="#F7DF1E" font-family="monospace" font-size="48" font-weight="bold" text-anchor="middle" filter="url(#glow)">
        JS_2
      </text>
      <!-- Generative grid nodes -->
      <circle cx="90" cy="70" r="3" fill="#F7DF1E" opacity="0.4"/>
      <circle cx="310" cy="150" r="4" fill="#F97316" opacity="0.6"/>
      <line x1="90" y1="70" x2="180" y2="112.5" stroke="#F7DF1E" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
    
    </svg>
  