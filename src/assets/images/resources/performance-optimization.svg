
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="100%" height="100%">
      <!-- Space background -->
      <rect width="400" height="225" fill="#0B1120"/>
      <!-- Grid -->
      <path d="M 0 25 L 400 25 M 0 50 L 400 50 M 0 75 L 400 75 M 0 100 L 400 100 M 0 125 L 400 125 M 0 150 L 400 150 M 0 175 L 400 175 M 0 200 L 400 200" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <path d="M 50 0 L 50 225 M 100 0 L 100 225 M 150 0 L 150 225 M 200 0 L 200 225 M 250 0 L 250 225 M 300 0 L 300 225 M 350 0 L 350 225" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <!-- Glowing filters -->
      <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="12" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <radialGradient id="grad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#00D8FF" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Big backing radial glow -->
      <circle cx="200" cy="112.5" r="160" fill="url(#grad)"/>
      
      <!-- Tech elements -->
      
      <g filter="url(#glow-heavy)">
        <circle cx="200" cy="112.5" r="25" fill="#00D8FF" opacity="0.8"/>
      </g>
      <ellipse cx="200" cy="112.5" rx="120" ry="45" fill="none" stroke="#00D8FF" stroke-width="1.5" opacity="0.35" transform="rotate(75 200 112.5)"/><circle cx="115.14718625761428" cy="80.68019484660536" r="4" fill="#00D8FF" filter="url(#glow)"/><ellipse cx="200" cy="112.5" rx="105" ry="40" fill="none" stroke="#00D8FF" stroke-width="1.5" opacity="0.35" transform="rotate(111 200 112.5)"/><circle cx="227.17599973576472" cy="73.86296694843728" r="4" fill="#00D8FF" filter="url(#glow)"/><ellipse cx="200" cy="112.5" rx="90" ry="35" fill="none" stroke="#00D8FF" stroke-width="1.5" opacity="0.35" transform="rotate(147 200 112.5)"/><circle cx="286.93332436601617" cy="103.44133342141177" r="4" fill="#00D8FF" filter="url(#glow)"/><ellipse cx="200" cy="112.5" rx="75" ry="30" fill="none" stroke="#00D8FF" stroke-width="1.5" opacity="0.35" transform="rotate(183 200 112.5)"/><circle cx="253.03300858899112" cy="133.7132034355964" r="4" fill="#00D8FF" filter="url(#glow)"/><ellipse cx="200" cy="112.5" rx="60" ry="25" fill="none" stroke="#00D8FF" stroke-width="1.5" opacity="0.35" transform="rotate(219 200 112.5)"/><circle cx="184.47085729384878" cy="136.6481456572267" r="4" fill="#00D8FF" filter="url(#glow)"/>
    
    </svg>
  