
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" width="100%" height="100%">
      <!-- Space background -->
      <rect width="400" height="225" fill="#0B1120"/>
      <!-- Grid -->
      <path d="M 0 25 L 400 25 M 0 50 L 400 50 M 0 75 L 400 75 M 0 100 L 400 100 M 0 125 L 400 125 M 0 150 L 400 150 M 0 175 L 400 175 M 0 200 L 400 200" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <path d="M 50 0 L 50 225 M 100 0 L 100 225 M 150 0 L 150 225 M 200 0 L 200 225 M 250 0 L 250 225 M 300 0 L 300 225 M 350 0 L 350 225" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
      <!-- Glowing filters -->
      <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-heavy" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="12" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <radialGradient id="grad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <!-- Big backing radial glow -->
      <circle cx="200" cy="112.5" r="160" fill="url(#grad)"/>
      
      <!-- Tech elements -->
      
      <g transform="translate(100, 50)">
        <rect x="0" y="0" width="200" height="120" rx="8" fill="none" stroke="#6366F1" stroke-width="2" opacity="0.3"/>
        <line x1="0" y1="40" x2="200" y2="40" stroke="#6366F1" stroke-width="1.5" opacity="0.3"/>
        <!-- Routing steps -->
        <circle cx="40" cy="80" r="10" fill="#6366F1" filter="url(#glow)"/>
        <line x1="50" y1="80" x2="90" y2="80" stroke="#A855F7" stroke-width="2" stroke-dasharray="2,2"/>
        <circle cx="100" cy="80" r="10" fill="#ffffff" opacity="0.9"/>
        <line x1="110" y1="80" x2="150" y2="80" stroke="#A855F7" stroke-width="2"/>
        <circle cx="160" cy="80" r="10" fill="#A855F7" filter="url(#glow)"/>
      </g>
      <text x="200" y="35" fill="#ffffff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">
        N_ROUTE_3
      </text>
    
    </svg>
  